<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>TS Todo</title>
    <link rel="stylesheet" href="./todo.css" />
  </head>
  <body class="page">
    <main class="layout">
      <h1 class="layout__title">Todo</h1>

      <section class="planner">
        <input
          id="todo-input"
          class="planner__input"
          type="text"
          placeholder="할 일을 입력하고 Enter를 눌러 추가하세요."
        />
      </section>

      <section class="board">
        <div class="board__column">
          <h2 class="board__title">TODO</h2>
          <ul id="todo-list" class="todo-list"></ul>
        </div>
        <div class="board__column">
          <h2 class="board__title">DONE</h2>
          <ul id="done-list" class="todo-list todo-list--done"></ul>
        </div>
      </section>
    </main>

    <script src="./dist/todo.js"></script>
  </body>
</html>
