<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="plan_container">
        <header>
            <h1>TODO</h1>
        </header>
        <section class="input_container">
            <input id="input_container__plan_input" type="text" placeholder="스터디 계획을 작성해 보세요">
            <button id="input_container__add_btn">등록</button>
        </section>
        <main>
            <section id="todo_area">
                <p>해야 할 일</p>
                <ul id="todo_list"></ul>
            </section>
            <section id="done_area">
                <p>해낸 일</p>
                <ul id="done_list"></ul>
            </section>
        </main>
    </div>
    <script src="dist/Todo.js" defer></script>
</body>
</html>
