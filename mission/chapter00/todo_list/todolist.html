<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <header class="container__header">
        <h1 class="container__title">Study Planner</h1>
        <form action="" class="container__form">
          <input
            type="text"
            id="todo-input"
            class="container__input"
            placeholder="오늘의 계획을 세워보세요."
          />
          <button class="container__button">계획 추가</button>
        </form>
      </header>
      <div class="render-container">
        <section class="render-container__section">
          <h2 class="render-container__title">계획</h2>
          <ul id="todo-list" class="render-container__todo"></ul>
        </section>
        <section class="render-container__section">
          <h2 class="render-container__title">완료</h2>
          <ul id="done-list" class="render-container__done"></ul>
        </section>
      </div>
    </div>
    <script src="./todolist.js"></script>
  </body>
</html>
