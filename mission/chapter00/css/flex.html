<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .top {
        display: flex;
      }
      .header {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 300px;
        height: 70px;
        background-color: black;
        text-align: center;
        font-weight: bold;
        font-size: 30px;
        color: white;
      }
      .menu {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 700px;
        height: 70px;
        background-color: red;
        text-align: center;
        font-weight: bold;
        font-size: 30px;
        color: white;
      }
      .hero {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 1000px;
        height: 500px;
        background-color: cadetblue;
        text-align: center;
        font-weight: bold;
        font-size: 30px;
        color: white;
      }
      .content {
        display: grid;
        grid-template-columns: 500px 250px 250px;
        grid-template-rows: 200px 200px;
      }
      .main {
        grid-column: 1 / 2;
        grid-row: 1/3;
        background-color: navy;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        font-size: 30px;
      }
      .empty {
        grid-column: 2/3;
        grid-row: 1/3;
      }
      .image {
        grid-column: 3/4;
        grid-row: 1/2;
        background-color: aquamarine;
        color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        font-size: 30px;
      }
      .extra {
        grid-column: 3/4;
        grid-row: 2/3;
        background-color: lightgreen;
        color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        font-size: 30px;
      }
      .banner {
        width: 1000px;
        height: 70px;
        background-color: yellow;
        color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        font-size: 30px;
      }
    </style>
  </head>
  <body>
    <div class="top">
      <header class="header">HEADER</header>
      <div class="menu">MENU</div>
    </div>
    <div class="hero">HERO</div>
    <div class="content">
      <div class="main">MAIN</div>
      <div class="empty"></div>
      <div class="image">IMAGE</div>
      <div class="extra">EXTRA</div>
    </div>
    <div class="banner">BANNER</div>
  </body>
</html>
