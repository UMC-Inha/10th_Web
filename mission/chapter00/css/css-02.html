<!-- 🍠 미션 2 - 정렬 기능 활용 구조 잡기 -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정렬 기능 활용</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background-color: white;
    }

    .container {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 100px 360px 420px 120px;
    }

    .top {
      display: flex;
    }

    .header,
    .menu,
    .hero,
    .main,
    .image,
    .extra,
    .banner {
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 36px;
    }

    .header {
      width: 25%;
      background-color: #0b1636;
      color: white;
    }

    .menu {
      width: 75%;
      background-color: #f23b52;
      color: white;
    }

    .hero {
      background-color: #5a8bc7;
      color: white;
    }

    .content {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
    }

    .main {
      background-color: #24395a;
      color: white;
    }

    .blank {
      background-color: #ececec;
    }

    .side {
      display: flex;
      flex-direction: column;
    }

    .image {
      flex: 1;
      background-color: #c7e4e7;
      color: black;
    }

    .extra {
      flex: 1;
      background-color: #4fc19a;
      color: black;
    }

    .banner {
      background-color: #f4cc69;
      color: black;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-rows: 80px 240px auto 100px;
      }

      .top {
        flex-direction: column;
      }

      .header,
      .menu {
        width: 100%;
        height: 80px;
      }

      .content {
        grid-template-columns: 1fr;
      }

      .main {
        min-height: 220px;
      }

      .blank {
        min-height: 120px;
      }

      .side {
        min-height: 240px;
      }

      .header,
      .menu,
      .hero,
      .main,
      .image,
      .extra,
      .banner {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div class="header">HEADER</div>
      <div class="menu">MENU</div>
    </div>

    <div class="hero">HERO</div>

    <div class="content">
      <div class="main">MAIN</div>
      <div class="blank"></div>
      <div class="side">
        <div class="image">IMAGE</div>
        <div class="extra">EXTRA</div>
      </div>
    </div>

    <div class="banner">BANNER</div>
  </div>
</body>
</html>
