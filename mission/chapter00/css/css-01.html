<!-- ### 🍠 미션 1. 제출

- 미션 1 - 실행 영상 제출
- 미션 1 - 깃허브 링크 제출
- 미션 1 - 반응형 디자인을 구현하면서 알게 된 개념, 사용한 CSS 속성을 정리한 내용 -->

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aido Navbar</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background-color: #f5f4f2;
      background-image: radial-gradient(#d7d3ce 1.2px, transparent 1.2px);
      background-size: 48px 48px;
      padding: 32px;
    }

    .navbar {
      width: 100%;
      margin: 0 auto;
      padding: 28px 40px;
      background-color: #ffffff;
      border: 5px solid #2a2a2a;
      border-radius: 40px;
      box-shadow: 10px 12px 0 #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-shrink: 0;
    }

    .brand__icon {
      width: 74px;
      height: 74px;
      border: 4px solid #2a2a2a;
      border-radius: 22px;
      background-color: #ff6438;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.08);
    }

    .brand__title {
      font-size: 44px;
      font-weight: 800;
      color: black;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 44px;
    }

    .nav-menu {
      display: flex;
      align-items: center;
      gap: 48px;
      list-style: none;
      margin: 0;
      padding: 0;
      white-space: nowrap;
    }

    li {
        font-size: 28px;
        font-weight: 800;
        color: #8b8b8b;
    }
    .nav-menu .is-highlight {
      color: #ff6438;
    }

    .lang-switch {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 14px 12px 28px;
      border: 4px solid #2a2a2a;
      border-radius: 999px;
      background-color: #fff;
      box-shadow: 8px 8px 0 #2a2a2a;
      flex-shrink: 0;
    }

    .lang-switch__label {
      font-size: 20px;
      font-weight: 700;
      color: #8a8a8a;
      white-space: nowrap;
    }

    .lang-switch__buttons {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .lang-btn {
      min-width: 88px;
      height: 56px;
      padding: 0 20px;
      border: 4px solid #2a2a2a;
      border-radius: 1000px;
      background-color: #fff;
      color: #6d6d6d;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
    }

    .lang-btn--active {
      background-color: #ff6438;
      color: #fff;
    }

    @media (max-width: 900px) {
    .nav-menu {
        display: none;
    }

    .navbar {
        padding: 20px 24px;
    }

    .nav-right {
        gap: 16px;
    }

    .brand__title {
        font-size: 32px;
    }
    }

  </style>
</head>
<body>
  <nav class="navbar">
    <div class="brand">
      <div class="brand__icon">🐱</div>
      <h1 class="brand__title">Aido</h1>
    </div>

    <div class="nav-right">
      <ul class="nav-menu">
        <li>고양이 친구들</li>
        <li class="is-highlight">출시 알람 받기</a></li>
      </ul>

      <div class="lang-switch">
        <span class="lang-switch__label">언어</span>
        <div class="lang-switch__buttons">
          <button class="lang-btn lang-btn--active" type="button">KO</button>
          <button class="lang-btn" type="button">EN</button>
        </div>
      </div>
    </div>
  </nav>
</body>
</html>
