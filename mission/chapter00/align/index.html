<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout 실습</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="layout">
      <!-- HEADER -->
      <header class="layout__header">
        <div class="header">
          <div class="header__left">HEADER</div>
          <div class="header__right">MENU</div>
        </div>
      </header>

      <!-- HERO -->
      <section class="layout__hero">HERO</section>

      <!-- MAIN -->
      <main class="layout__main">MAIN</main>

      <!-- SIDE -->
      <aside class="layout__side">
        <div class="side">
          <div class="side__image">IMAGE</div>
          <div class="side__extra">EXTRA</div>
        </div>
      </aside>

      <!-- BANNER -->
      <footer class="layout__banner">BANNER</footer>
    </div>
  </body>
</html>
