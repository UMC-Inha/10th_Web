<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex & Grid 레이아웃</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: #edf2f9;
    }

    .box {
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      letter-spacing: 1px;
    }

    .top-row {
      display: flex;
      height: 10vh;
    }
    .header-box {
      flex: 1;
      background-color: #1f2c46;
      color: white;
    }
    .menu-box {
      flex: 3;
      background-color: #c93e54;
      color: white;
    }

    .hero-box {
      height: 35vh;
      background-color: #4b7bc4;
      color: white;
    }

    .middle-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      height: 40vh;
    }
    .main-box {
      background-color: #273756;
      color: white;
    }
    .empty-space {
    }
    
    .right-col {
      display: flex;
      flex-direction: column;
    }
    .image-box {
      flex: 1;
      background-color: #afd5df;
      color: black;
    }
    .extra-box {
      flex: 1;
      background-color: #55b28d;
      color: black;
    }

    .banner-box {
      height: 15vh;
      background-color: #e0c268;
      color: black;
    }

    @media (max-width: 768px) {
      .top-row { flex-direction: column; height: auto; }
      .header-box, .menu-box { padding: 20px 0; }
      
      .middle-row { 
        grid-template-columns: 1fr;
        height: auto;
      }
      .main-box, .image-box, .extra-box { height: 200px; }
      .empty-space { display: none; }
    }
  </style>
</head>
<body>

  <header class="top-row">
    <div class="box header-box">HEADER</div>
    <div class="box menu-box">MENU</div>
  </header>

  <section class="box hero-box">HERO</section>

  <main class="middle-row">
    <div class="box main-box">MAIN</div>
    <div class="empty-space"></div>
    <aside class="right-col">
      <div class="box image-box">IMAGE</div>
      <div class="box extra-box">EXTRA</div>
    </aside>
  </main>

  <footer class="box banner-box">BANNER</footer>

</body>
</html>
