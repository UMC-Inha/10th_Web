<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>transition 실습</title>

    <style>
      body {
        margin: 0;
        height: 200vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 100px;
        padding-top: 100px;
      }

      .diamond {
        width: 200px;
        height: 200px;
        background: lightpink;

        /* 마름모 */
        transform: rotate(45deg);

        /* transition 축약형 */
        transition: background-color 0.5s ease;
      }

      /* hover 시 색상 변경 */
      .diamond:hover {
        background-color: purple;
      }
    </style>
  </head>

  <body>
    <div class="diamond"></div>
    <div class="diamond"></div>
    <div class="diamond"></div>
  </body>
</html>
