<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display 실습</title>
    <style>
        .block {display:block; background-color: aliceblue; width: 200px; margin-bottom: 5px;}
        .inline {display:inline; background-color:lightblue;}
        .inline-block {display:inline-block; background-color:paleturquoise; width: 500px; height: 50px; margin-bottom: 5px;}
    </style>
</head>
<body>
    <h2>1. block</h2>
    <div class="block">block A</div>
    <div class="block">block B</div>
    <div class="block">block C</div>

    <h2>2. inline</h2>
    <span class="inline">inline A</span>
    <span class="inline">inline B</span>
    <span class="inline">inline C</span>

    <h2>3. inline-block</h2>
    <span class="inline-block">inline-block A</span>
    <span class="inline-block">inline-block B</span>
    <span class="inline-block">inline-block C</span>
</body>
</html>
