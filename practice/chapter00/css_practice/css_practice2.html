<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <style>
    @keyframes bounce {
      0% {
        transform:translateY(0);
      }
      80% {
        transform: translateY(300px) scale(0.8, 1.2);
      }
      100% {
        transform: translateY(300px) scale(1.5, 0.5);
      }
    }
    body {
      display: flex;
      justify-content: center;
    }
    .ball {
      width: 80px;
      height: 80px;
      background-color: #640490;
      border-radius: 40px;
      animation: bounce 1s ease-in infinite alternate;
    }
  </style>
</head>
<body>
    <div class="ball"></div>
</body>
</html>
