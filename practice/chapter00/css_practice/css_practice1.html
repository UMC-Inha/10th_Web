<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <style>
    body {
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 50px;
    }
    .box {
      width: 100px;
      height: 100px;
      background-color: #e98ead; 
      transform: rotate(45deg);
      transition: background-color 500ms ease-in-out;
    }
    .box:hover {
      background-color: #9b04f2;
    }
  </style>
</head>
<body>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
</body>
</html>
