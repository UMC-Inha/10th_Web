<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            background-color: red;
        }
        span{
            background-color: blue;
        }
        .inline-block{
            display: inline-block;
            background-color: greenyellow;
        }
        .scaled{
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    <h1>블럭 요소</h1>
    <p>블럭 요소 중간에<span>인라인 요소</span>넣기</p>
    <p class="inline-block">인라인 블럭요소</p>
    <p class="inline-block">인라인 블럭요소</p>
    <p class="inline-block">인라인 블럭요소</p>
    <p class="inline-block scaled">인라인 블럭요소</p>
</body>
</html>
