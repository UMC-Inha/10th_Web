<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Animation 실습</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 50px;
        }

        .ball {
            width: 100px;
            height: 100px;
            background-color: purple;
            border-radius: 50%;
            animation: bounce 0.6s ease-in-out infinite alternate;
        }

        @keyframes bounce {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(200px);
            }
        }
    </style>
</head>
<body>

    <div class="ball"></div>

</body>
</html>
