<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>block inline inline-block 실습</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>🔍 block / inline / inline-block 비교하기</h1>

    <section>
      <h2>1. block 요소</h2>
      <div class="box block-box">BLOCK 1</div>
      <div class="box block-box">BLOCK 2</div>
      <div class="box block-box">BLOCK 3</div>
    </section>

    <section>
      <!-- 공백 제거 -->
      <h2>2. inline 요소</h2>
      <span class="box inline-box">INLINE 1</span>
      <span class="box inline-box">INLINE 2</span>
      <span class="box inline-box">INLINE 3</span>
      <span class="box inline-box">INLINE 4</span>
      <span class="box inline-box">INLINE 5</span>
      <span class="box inline-box">INLINE 6</span>
      <span class="box inline-box">INLINE 7</span>
      <span class="box inline-box">INLINE 8</span>
      <span class="box inline-box">INLINE 9</span>
    </section>

    <section>
      <h2>3. inline-block 요소</h2>
      <span class="box inline-block-box">INLINE-BLOCK 1</span>
      <span class="box inline-block-box">INLINE-BLOCK 2</span>
      <span class="box inline-block-box">INLINE-BLOCK 3</span>
    </section>
  </body>
</html>
