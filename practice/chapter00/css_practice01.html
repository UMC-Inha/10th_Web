<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>박스 색깔 변경</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f8f9fa;
      gap: 30px;
    }

    .box {
      width: 150px;
      height: 150px;
      background-color: #e2e8f0; 
      border-radius: 20px;       
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: #333;
      cursor: pointer;

      transition: background-color 0.4s ease, color 0.4s ease;
    }

    .box-1:hover {
      background-color: #ff7675;
      color: white;
    }

    .box-2:hover {
      background-color: #55efc4;
      color: white;
    }

    .box-3:hover {
      background-color: #74b9ff;
      color: white;
    }
  </style>
</head>
<body>

  <div class="box box-1"></div>
  <div class="box box-2"></div>
  <div class="box box-3"></div>

</body>
</html>
