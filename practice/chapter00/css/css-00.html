<!-- 실습 과제:
 - 이제 여러분 차례예요! 위의 이미지 상태에서 고구마 상자를 아래 이미지처럼 이동시켜보세요. -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상자 이동 실습</title>
  <style>
    .box {
      width: 100px;
      height: 100px;
      background-color: purple;
      color: white;
      box-sizing: border-box;
      position: relative;
      top: 50px;
      left: 50px;
    }

    .text {
        position: relative;
        top: -100px;
        left: 50px;
    }
  </style>
</head>

<body>
  <div class="box">BOX</div>
  <h1 class="text">고구마 상자</h1>
</body>

</html>
