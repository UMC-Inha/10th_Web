<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Animation 실습</title>
    <style>
      body {
        padding: 300px;
      }

      .ball {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: purple;
        animation: bounce 1s ease-in-out infinite alternate;
        /* name: bounce, duration: 1s, timing-function: ease-in-out, iteration-count: infinite, direction: alternate */
      }

      @keyframes bounce {
        0% {
          transform: translateY(0) scale(1, 1);
        }
        100% {
          transform: translateY(120px) scale(1.1, 0.9);
        }
      }
    </style>
  </head>
  <body>
    <div class="ball"></div>
  </body>
</html>
