<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
        }
        .text-align {
            text-align: center;
        }

        .margin {
            margin: 0 auto;
        }
        
        .flex {
            justify-content: center;
            align-items: center;
        }

        .grid {
            place-items: center;
        }
    </style>
</head>
<body>
    <div class="box text-align">
        <p>가운데 정렬</p>
    </div>
    <div class="box margin">가운데 정렬</div>
    <div class="box flex">가운데 정렬</div>
    <div class="box grid">가운데 정렬</div>
</body>
</html>
